<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="https://umami.toxolinko.site/script.js" data-website-id="17f4a685-40b7-46e6-9313-a9f79d9525f4"></script>
    <title>Notas</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
        (function () {
            const t = localStorage.getItem('notas_blancas_theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.dataset.theme = t;
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div id="tab-bar">
        <div id="new-tab-btn" title="Nueva pestaña (Ctrl+T)">+</div>
        <button id="trash-btn" title="Papelera">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2.5,4.5 13.5,4.5"/>
                <path d="M5.5 4.5V3A1 1 0 0 1 6.5 2h3a1 1 0 0 1 1 1v1.5"/>
                <path d="M4 4.5l.75 9a.75.75 0 0 0 .75.75h5a.75.75 0 0 0 .75-.75L12 4.5"/>
            </svg>
            <span id="trash-badge" hidden></span>
        </button>
        <input type="file" id="import-input" accept=".txt" hidden>
        <button id="import-btn" title="Importar archivo de texto">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 2v9M4.5 7.5L8 11l3.5-3.5"/>
                <path d="M3 13h10"/>
            </svg>
        </button>
        <button id="export-btn" title="Exportar pestaña como .txt">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 11V2M4.5 5.5L8 2l3.5 3.5"/>
                <path d="M3 13h10"/>
            </svg>
        </button>
        <button id="theme-btn" title="Cambiar tema">
            <svg class="theme-icon-moon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z"/>
            </svg>
            <svg class="theme-icon-sun" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="3"/>
                <line x1="8" y1="1" x2="8" y2="3"/>
                <line x1="8" y1="13" x2="8" y2="15"/>
                <line x1="1" y1="8" x2="3" y2="8"/>
                <line x1="13" y1="8" x2="15" y2="8"/>
                <line x1="3.05" y1="3.05" x2="4.46" y2="4.46"/>
                <line x1="11.54" y1="11.54" x2="12.95" y2="12.95"/>
                <line x1="12.95" y1="3.05" x2="11.54" y2="4.46"/>
                <line x1="4.46" y1="11.54" x2="3.05" y2="12.95"/>
            </svg>
        </button>
        <button id="preview-toggle" title="Alternar vista previa (Ctrl+P)">Preview</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Escribe aquí..."></textarea>
    <div id="preview" hidden></div>
    <div id="snippet-menu" hidden></div>

    <div id="trash-modal" hidden>
        <div class="trash-overlay"></div>
        <div class="trash-panel">
            <div class="trash-header">
                <span class="trash-title">Papelera</span>
                <button class="trash-close-btn">×</button>
            </div>
            <div class="trash-list"></div>
            <div class="trash-footer">
                <button class="trash-empty-all-btn">Vaciar papelera</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
